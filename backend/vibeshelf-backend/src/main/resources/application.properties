spring.application.name=vibeshelf-backend

# ===============================
# Database (MySQL)
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/books_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD}

# ===============================
# JPA / Hibernate
# ===============================
spring.jpa.hibernate.ddl-auto=none
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.open-in-view=false

# ===============================
# CSV Import (DISABLED)
# ===============================
app.import.force=false

# ===============================
# Server
# ===============================
server.port=8080

# ===============================
# Actuator
# ===============================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
management.health.mail.enabled=false
management.health.redis.enabled=false

# ===============================
# Flyway
# ===============================
spring.flyway.enabled=false

# ===============================
# Ollama Configuration
# ===============================
ollama.api.url=http://localhost:11434/api/generate
ollama.model=mistral
ollama.temperature=0.85
ollama.timeout-ms=180000

# ===============================
# GROQ Configuration
# ===============================
groq.api-key=${GROQ_API_KEY}
groq.api-url=https://api.groq.com/openai/v1/chat/completions
groq.model=llama-3.3-70b-versatile

# ===============================
# Caching Configuration
# ===============================
vibeshelf.cache.ttl-minutes=60
vibeshelf.cache.max-size=500

spring.config.import=optional:configtree:/run/secrets/